<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> Mixtape 🎵</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #fff7ad 0%, #ffed7b 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }

    .page-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        width: 100%;
        max-width: 1300px;
    }

    .left-section {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .name-title {
        font-size: 40px;
        letter-spacing: 10px;
        margin-bottom: 20px;
    }

    .name-title span { opacity: 0.5; }
    .name-title .active { font-weight: bold; opacity: 1; }

    .song-title {
        margin-bottom: 25px;
        font-size: 18px;
    }

    .note-box {
        width: 350px;
        height: 300px;
        background: #ffffffbb;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        padding: 20px;
        font-size: 16px;
        line-height: 1.4;
        overflow-y: auto;
        scrollbar-width: thin;
        background-image: repeating-linear-gradient(
            to bottom,
            rgba(0,0,0,0.05) 0px,
            rgba(0,0,0,0.05) 1px,
            transparent 1px,
            transparent 25px
        );
        background-size: 100% 25px;
    }

    .cassette {
        background: linear-gradient(to bottom, #2c2c2c 0%, #1a1a1a 100%);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        position: relative;
        width: 500px;
    }

    .cassette-top {
        background: #1a1a1a;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
        border: 3px solid #333;
    }

    .label {
        background: #f5e6d3;
        border-radius: 5px;
        padding: 15px;
        margin-bottom: 15px;
        text-align: center;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }

    .reels {
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 20px;
    }

    .reel {
        width: 80px;
        height: 80px;
        background: #333;
        border-radius: 50%;
        border: 8px solid #555;
        animation: spin 3s linear infinite;
        animation-play-state: paused;
        position: relative;
    }

    .reel::before,
    .reel::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 4px;
        top: 50%;
        left: 0;
    }

    .reel::before { 
        background: rgba(255,255,255,0.20);
        transform: translateY(-50%) rotate(-45deg);
    }

    .reel::after { 
        background: rgba(255,255,255,0.25);
        transform: translateY(-50%) rotate(45deg);
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .reel.playing { animation-play-state: running; }

    .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    button {
        background: #444;
        border: none;
        color: #fff;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .volume-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
        justify-content: center;
    }

    .now-playing {
        text-align: center;
        margin-top: 15px;
        background: rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 10px;
        color: #fff;
    }
</style>
</head>

<body>
<div style="position:absolute; top:20px; width:100%; text-align:center; font-size:36px; font-weight:bold;">
    🎂 HAPPY BIRTHDAY 🎂
</div>
<div class="page-wrapper">

    <div class="left-section">

        <div class="name-title" id="nameTitle">
            <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span>
        </div>

        <div class="song-title" id="songTitle">Soch Na Sake</div>

        <div class="cassette">

            <div class="cassette-top">
                <div class="label">
                    <h2>🎵 Mixtape</h2>
                    <p> ♤♤♤♤♤ </p>
                </div>

                <div class="reels">
                    <div class="reel"></div>
                    <div class="reel"></div>
                </div>
            </div>

            <div class="controls">
                <button onclick="previousTrack()">⏮️ Prev</button>
                <button onclick="togglePlay()" id="playBtn">▶️ Play</button>
                <button onclick="nextTrack()">⏭️ Next</button>
            </div>

            <div class="volume-control">
                🔉 <input type="range" id="volumeSlider"
                 min="0" max="100" value="70"> 🔊
            </div>

            <div class="now-playing">
                <div id="trackInfo">Track 1 of 8</div>
                <div id="trackTitle">Now playing...</div>
            </div>
        </div>
    </div>

    <div class="note-box" id="noteBox">
      Text Goes Here
    </div>

</div>

<div id="player" style="display:none;"></div>

<!-- MUST be above your script and unblocked -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const playlist = [
    "MRtRcTfszjY", "FJ55SHCzt88", "vwsWXUGLRts", "wqgUzLHgNMI",
    "6vXG7JOYfn8", "CNZMIhckaA0", "7NLfpsNHmZI", "fbdxYoFb64g"
];

const songNames = [
    "Soch Na Sake", "Humdard", "Amar Mawte (আমার মতে)",
    "Wishlist", "Mere Naam Tu", "Aaoge Jab Tum",
    "Bhalobashar Morshum (ভালবাসার মরশুম)", "Abhi Kuch Dino Se"
];

const songNotes = [
    "Note 1",
    "Note 2",
    "Note 3",
    "Note 4",
    "Note 5",
    "Note 6",
    "Note 7",
    "Note 8"
];

let player, currentTrack = 0, isPlaying = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        height: "0", width: "0",
        videoId: playlist[0],
        playerVars: { playsinline: 1, controls: 0 },
        events: { onReady: onReady, onStateChange: onState }
    });
}

function onReady() {
    player.setVolume(70);
}

function onState(event) {
    if (event.data === YT.PlayerState.ENDED) nextTrack();
}

function updateUI() {
    document.getElementById("trackInfo").textContent =
      `Track ${currentTrack + 1} of ${playlist.length}`;

    document.getElementById("songTitle").textContent =
      songNames[currentTrack];

    document.getElementById("noteBox").textContent =
      songNotes[currentTrack];

    const spans = document.querySelectorAll("#nameTitle span");
    spans.forEach(s => s.classList.remove("active"));
    spans[currentTrack].classList.add("active");
}

function togglePlay() {
    if (!player) return;
    const reels = document.querySelectorAll(".reel");
    const btn = document.getElementById("playBtn");

    if (!isPlaying) {
        player.playVideo();
        reels.forEach(r => r.classList.add("playing"));
        btn.textContent = "⏸️ Pause";
        isPlaying = true;
    } else {
        player.pauseVideo();
        reels.forEach(r => r.classList.remove("playing"));
        btn.textContent = "▶️ Play";
        isPlaying = false;
    }
}

function nextTrack() {
    if (!player) return;
    currentTrack = (currentTrack + 1) % playlist.length;
    player.loadVideoById(playlist[currentTrack]);
    updateUI();
}

function previousTrack() {
    if (!player) return;
    currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
    player.loadVideoById(playlist[currentTrack]);
    updateUI();
}

document.getElementById("volumeSlider").addEventListener("input", () => {
    if (player) player.setVolume(volumeSlider.value);
});

updateUI();
</script>

</body>
</html>
